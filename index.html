        // 游戏点击事件：在当前 about:blank 内覆盖全屏加载游戏
        // 支持 3D 视角锁定、全屏、手柄
        function loadGame(targetUrl) {
            const iframe = document.createElement('iframe');
            iframe.src = targetUrl;
            iframe.className = 'fullscreen-iframe';
            iframe.setAttribute('allow', 'autoplay; gamepad; fullscreen; pointer-lock');
            iframe.setAttribute('allowfullscreen', 'true');
            document.body.appendChild(iframe);
            document.title = "Google Classroom";

        // 针对部分特殊 H5 游戏（如 dadish），如果遇到嵌套黑屏，可以选用该备用方法

        // 核心跳转机制
        function openBlank() {
            const blankWin = window.open('about:blank', '_blank');
            if (blankWin) {
                blankWin.document.open();
                blankWin.document.write(mcHTML);
                blankWin.document.close();
                
                // 将原 GitHub 标签页也强制洗白成 about:blank 隐藏痕迹
                window.location.replace('about:blank');
            } else {
                // 如果被浏览器拦截，显示后备按钮供手动点击
                document.querySelector('button').style.display = 'block';
                alert('游戏中心启动失败：请点击屏幕上的按钮，并在浏览器右上角允许弹窗！');
            }
        }

        // 页面一加载就执行
        window.addEventListener('load', function() {
            setTimeout(openBlank, 100);
        });
    </script>
